<!DOCTYPE html>
<html lang="en">

<head>
    <title>Monmouth County</title>

    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="manifest" href="/site.webmanifest">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous" />
    <link rel="stylesheet" href="https://use.typekit.net/mca1efy.css">
    <link rel="stylesheet" href="styless.css" />
</head>

<body>
    <nav class="navbar navbar navbar-expand-lg navbar-custom px-2" id="navbar">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold color" href="index.html">Monmouth County</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false"
                aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link color" href="direct.html">Directory</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link color" href="new.html">New Resources Form</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="page-content">
        <div class="form">
            <div class="container">

                <div class="row justify-content-center align-items-center">

                    <!-- Form -->
                    <div class="col-12 col-lg-6 d-flex align-items-start">
                        <div class="w-100">
                            <h6 class="title-2">Form</h6>

                            <form id="resourceForm">
                                <label class="ffword">Resource Name</label>
                                <input type="text" id="name" required>

                                <label class="ffword">Resource Link</label>
                                <input type="url" id="link" required>

                                <label class="ffword">Description</label>
                                <textarea id="description" rows="3" required></textarea>

                                <label class="ffword">Resource Contact Info</label>
                                <input type="text" id="resourceContact" required>

                                <label class="ffword">Your Contact Info (Submitter)</label>
                                <input type="text" id="submitterContact" required>

                                <button class="button-down" type="submit">Submit</button>
                            </form>

                            <div class="success" id="successMessage"></div>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </div>

    <footer class="footer mt-2">
        <div class="text-center">
            <p class="mb-0 footer-color">© 2026 Monmouth County</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
        integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
        crossorigin="anonymous"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.min.js"
        integrity="sha384-BBtl+eGJRgqQAUMxJ7pMwbEyER4l1g+O15P+16Ep7Q9Q+zqX6gSbd85u4mG4QzX+"
        crossorigin="anonymous"></script>
    <script src="scriptmain.js"></script>
</body>

</html>
